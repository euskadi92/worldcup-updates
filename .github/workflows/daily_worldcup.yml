name: Daily World Cup Update

on:
  schedule:
    # 03:00 UTC = 05:00 CEST (Paris, summer). GitHub scheduling lag of 2-3h means delivery
    # typically lands 05:00-08:00 Paris time, after all US/Canada games are done.
    # Adjust to 04:00 UTC in winter (CET).
    - cron: "0 3 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  send-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Send daily email
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python scripts/send_update.py
